<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Report - Easy Job</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="common.css" rel="stylesheet">
  <style>
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      body {
        margin: 0;
        padding: 0;
      }
      .no-print {
        display: none;
      }
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }
    
    .report-container {
      width: 210mm;
      min-height: 297mm;
      margin: 20px auto;
      background: white;
      padding: 12mm;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
      visibility: visible;
      display: block;
      overflow: visible;
      height: auto;
      max-height: none;
    }
    
    @media screen {
      .report-container {
        max-width: 210mm;
      }
    }
    
    .report-title {
      font-size: 18pt;
      font-weight: 900;
      color: #111;
      margin-bottom: 4mm;
      border-bottom: 2px solid #06b6d4;
      padding-bottom: 2mm;
      text-align: center;
      letter-spacing: 0.5px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    
    .report-section {
      margin-bottom: 5mm;
      padding-bottom: 4mm;
      page-break-inside: avoid;
    }
    
    .section-title {
      font-size: 11pt;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 2mm;
      margin-top: 2mm;
      padding-bottom: 1mm;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    
    .section-content {
      font-size: 9pt;
      line-height: 1.5;
      color: #374151;
      text-align: justify;
      margin-bottom: 1.5mm;
    }
    
    .section-content ul,
    .section-content ol {
      text-align: left;
      margin-top: 1mm;
      margin-bottom: 1.5mm;
      padding-left: 4mm;
    }
    
    .section-content li {
      margin-bottom: 1mm;
      line-height: 1.4;
    }
    
    .report-footer {
      margin-top: 5mm;
      padding-top: 2mm;
      font-size: 7pt;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="report-container">
    <div id="reportContent">
      <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-16 w-16 border-b-4 border-cyan-500 mx-auto mb-6"></div>
        <p class="text-gray-600">Loading report...</p>
      </div>
    </div>
  </div>
  
  <div class="no-print mt-8 text-center space-x-4 flex justify-center flex-wrap gap-4">
    <button onclick="downloadPDF()" class="bg-black text-white px-8 py-3 rounded-full font-semibold hover:bg-gray-800">
      Download as PDF
    </button>
    <button onclick="window.print()" class="bg-gray-700 text-white px-8 py-3 rounded-full font-semibold hover:bg-gray-600">
      Print Report
    </button>
    <button onclick="window.close()" class="bg-gray-500 text-white px-8 py-3 rounded-full font-semibold hover:bg-gray-600">
      Close
    </button>
  </div>

  <script>
    // Get report from localStorage first (avoids URL truncation), then URL parameter
    function loadReport() {
      const fromStorage = localStorage.getItem('careerReport');
      const urlParams = new URLSearchParams(window.location.search);
      const fromUrl = urlParams.get('report');
      // Prefer localStorage so long reports are not truncated by URL length limit
      let reportText = (fromStorage && fromStorage.length > 0) ? fromStorage : (fromUrl || '');
      
      if (!reportText || reportText.trim().length < 10) {
        document.getElementById('reportContent').innerHTML = 
          '<div class="text-center py-20">' +
          '<p class="text-red-600">No report found. Please complete the quiz first.</p>' +
          '<button onclick="window.close()" class="mt-4 bg-cyan-500 text-white px-8 py-3 rounded-full">Close</button>' +
          '</div>';
        return;
      }
      
      // Safe decode if value looks URL-encoded (from URL param)
      let report = reportText;
      if (fromUrl && reportText === fromUrl && reportText.includes('%')) {
        try {
          report = decodeURIComponent(reportText);
        } catch (e) {
          console.warn('Report URL decode failed, using raw:', e.message);
        }
      }
      
      // Handle JSON format
      try {
        const jsonData = JSON.parse(report);
        if (Array.isArray(jsonData) && jsonData[0] && jsonData[0].output) {
          report = jsonData[0].output;
        } else if (jsonData.output) {
          report = jsonData.output;
        } else if (jsonData.report) {
          report = jsonData.report;
        } else if (typeof jsonData === 'string') {
          report = jsonData;
        }
      } catch (e) {
        // Not JSON, use as is
      }
      
      if (!report || (typeof report === 'string' && report.trim().length < 10)) {
        document.getElementById('reportContent').innerHTML = 
          '<div class="text-center py-20">' +
          '<p class="text-red-600">Report content is empty or invalid.</p>' +
          '<button onclick="window.close()" class="mt-4 bg-cyan-500 text-white px-8 py-3 rounded-full">Close</button>' +
          '</div>';
        return;
      }
      
      // Store for download
      window.careerReportText = report;
      
      // Format and display report
      displayReport(report);
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function displayReport(report) {
      let cleanReport = report.trim();
      // Remove main title (with or without asterisks) – do not show
      cleanReport = cleanReport.replace(/\s*\*?\s*CAREER ASSESSMENT REPORT FOR HONG KONG JOB MARKET\s*\*+\s*/gi, '').trim();
      cleanReport = cleanReport.replace(/\s*\*?\s*CAREER ANALYSIS REPORT FOR HONG KONG JOB MARKET\s*\*+\s*/gi, '').trim();
      // Remove intro sentence (with or without final period)
      cleanReport = cleanReport.replace(/\s*Based on your quiz responses, here is a tailored analysis and career guidance for the Hong Kong context\.?\s*/gi, '').trim();
      cleanReport = cleanReport.replace(/\n\s*Based on your quiz responses[^\n]+Hong Kong context\.?\s*/gi, '\n').trim();
      cleanReport = cleanReport.replace(/^#+\s*/gm, '');
      
      const sections = cleanReport.split(/\n\s*\n/).filter(s => s.trim());
      
      let html = '<div class="report-title">Your Career Report</div>';
      
      // Process each block as plain content (no ## section headers)
      sections.forEach(section => {
        const trimmed = section.trim();
        if (!trimmed) return;
        // Remove any remaining ## or # in the text
        const noHash = trimmed.replace(/#+\s*/g, '');
        const content = noHash.trim();
        if (!content) return;
        
        // First line as section title: short line, or numbered part (e.g. "1. Personality Summary" or "*5. Summary**")
        const sectionMatch = content.match(/^(.+?)\n([\s\S]*)$/);
        let sectionTitle = null;
        if (sectionMatch && sectionMatch[2].trim()) {
          const firstLine = sectionMatch[1].trim().replace(/#+\s*/g, '');
          const isNumberedPart = /^\*?\s*\d+\.\s+.+/.test(firstLine) || firstLine.length < 60;
          if (firstLine.length < 80 && (isNumberedPart || !firstLine.includes('.'))) {
            sectionTitle = firstLine.replace(/^\*+\s*/, '').replace(/\*+\s*$/, '').trim();
          }
        }
        const mainContent = sectionTitle && sectionMatch[2].trim() ? sectionMatch[2].trim() : content;
        
        if (sectionTitle && mainContent) {
          html += '<div class="report-section">';
          html += '<div class="section-title">' + escapeHtml(sectionTitle) + '</div>';
        }
        const toFormat = (sectionTitle ? mainContent : content).replace(/#+\s*/g, '');
        if (toFormat) {
          if (!sectionTitle) html += '<div class="report-section">';
          const content = toFormat;
          if (content) {
            // Bullet lists: lines starting with * or - (strip character, render as list, no * shown)
            const lines = content.split('\n');
            const bulletStart = /^[\*\-]\s+/;
            if (lines.some(l => bulletStart.test(l.trim()))) {
              let inList = false;
              let listHtml = '';
              lines.forEach(line => {
                const trimmedLine = line.trim();
                const bulletMatch = trimmedLine.match(bulletStart);
                if (bulletMatch) {
                  if (!inList) {
                    inList = true;
                    listHtml = '<ul class="section-content" style="list-style: disc; margin-left: 8mm; margin-top: 2mm; margin-bottom: 3mm;">';
                  }
                  let itemText = trimmedLine.replace(bulletStart, '').trim();
                  itemText = itemText.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                  listHtml += '<li style="margin-bottom: 2mm; line-height: 1.6;">' + itemText + '</li>';
                } else {
                  if (inList) {
                    listHtml += '</ul>';
                    html += listHtml;
                    inList = false;
                    listHtml = '';
                  }
                  if (trimmedLine) {
                    let cleanLine = trimmedLine.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += '<div class="section-content" style="margin-top: 2mm;">' + cleanLine + '</div>';
                  }
                }
              });
              if (inList) html += listHtml + '</ul>';
            }
            // Numbered lists
            else if (content.match(/^\d+\.\s+/m)) {
              const items = content.split('\n')
                .filter(line => line.trim())
                .map(line => {
                  let text = line.replace(/^\d+\.\s+/, '').trim();
                  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                  return '<li style="margin-bottom: 2mm; line-height: 1.6;">' + text + '</li>';
                })
                .join('');
              html += '<ol class="section-content" style="list-style: decimal; margin-left: 8mm; margin-top: 2mm; margin-bottom: 3mm;">' + items + '</ol>';
            }
            // Regular paragraphs (strip any stray * from line starts)
            else {
              const paragraphs = content.split(/\n+/).filter(p => p.trim());
              paragraphs.forEach(para => {
                let formattedPara = para.trim().replace(/^[\*\-]\s*/, '');
                formattedPara = formattedPara.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                html += '<div class="section-content" style="margin-top: 2mm; text-indent: 0;">' + formattedPara + '</div>';
              });
            }
          }
          html += '</div>';
        }
        // Handle main title (#)
        else if (trimmed.match(/^#\s+(.+)$/)) {
          // Already handled in report-title
        }
        // Regular content without section header (strip * and escape)
        else if (trimmed) {
          const safe = trimmed.replace(/^[\*\-]\s*/, '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          html += '<div class="report-section"><div class="section-content">' + safe + '</div></div>';
        }
      });
      
      html += '<div class="report-footer">Generated on ' + new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + '</div>';
      
      // Set content
      document.getElementById('reportContent').innerHTML = html;
      
      // Clean up HTML entities after rendering
      setTimeout(() => {
        const allTextNodes = [];
        const walker = document.createTreeWalker(
          document.getElementById('reportContent'),
          NodeFilter.SHOW_TEXT,
          null,
          false
        );
        
        let node;
        while (node = walker.nextNode()) {
          if (node.textContent && node.textContent.includes('&amp;')) {
            node.textContent = node.textContent.replace(/&amp;/g, '&');
          }
        }
        
        // Remove any control characters
        const container = document.getElementById('reportContent');
        if (container) {
          container.innerHTML = container.innerHTML.replace(/[\u0000-\u001F\u007F-\u009F]/g, '');
        }
      }, 100);
    }
    
    function downloadPDF() {
      const element = document.querySelector('.report-container');
      if (!element) {
        console.error('downloadPDF: .report-container not found');
        alert('Report content not available');
        return;
      }
      const reportContent = document.getElementById('reportContent');
      if (!reportContent) {
        alert('Report content not available');
        return;
      }
      if (reportContent.innerHTML.includes('Loading report')) {
        alert('Please wait for the report to load completely.');
        return;
      }
      if (reportContent.innerHTML.includes('No report found') || reportContent.innerHTML.includes('Report content is empty')) {
        alert('No report to export. Please complete the quiz first and open the report again.');
        return;
      }
      var textLen = (element.textContent || '').trim().length;
      if (textLen < 50) {
        console.warn('downloadPDF: content too short', textLen);
        alert('Report content is too short. Wait for the report to load completely.');
        return;
      }
      if (!window.html2pdf) {
        alert('PDF library not loaded. Please try Print Report instead.');
        return;
      }
      const btn = document.querySelector('button[onclick="downloadPDF()"]');
      const originalText = btn ? btn.textContent : '';
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Generating PDF...';
      }
      const date = new Date().toISOString().split('T')[0];
      const filename = 'Career_Report_' + date + '.pdf';
      function restoreBtn() {
        if (btn) {
          btn.disabled = false;
          btn.textContent = originalText;
        }
      }
      // Ensure element is visible for html2canvas; hide scrollbar so no grey bar in PDF
      element.style.visibility = 'visible';
      element.style.display = 'block';
      element.style.maxHeight = 'none';
      element.style.height = 'auto';
      element.style.overflow = 'hidden';
      element.style.opacity = '1';
      element.style.boxShadow = 'none';
      window.scrollTo(0, 0);
      element.scrollIntoView({ block: 'start', behavior: 'instant' });
      // Short delay so any pending DOM updates finish before capture
      setTimeout(function () {
        requestAnimationFrame(function () {
          var fullHeight = element.scrollHeight;
          var fullWidth = Math.max(element.scrollWidth, 400);
          if (fullHeight < 100 || fullWidth < 100) {
            restoreBtn();
            console.warn('PDF: element size too small', fullWidth, fullHeight);
            alert('無法擷取報告區域，請稍後再試或使用「Print Report」。');
            return;
          }
          // Force single-page PDF: scale content so entire report fits on one A4 page (like view report)
          var onePageContentPx = 1020;
          var scale = fullHeight <= onePageContentPx ? 1.2 : Math.min(1.2, onePageContentPx / fullHeight);
          scale = Math.max(0.25, scale);
          console.log('PDF: one page, content length', textLen, 'height', fullHeight, 'scale', scale);
          var opt = {
            margin: [8, 8, 8, 8],
            filename: filename,
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: {
              scale: scale,
              useCORS: true,
              allowTaint: true,
              logging: false,
              scrollY: 0,
              scrollX: 0,
              backgroundColor: '#ffffff',
              height: fullHeight,
              width: fullWidth,
              windowHeight: fullHeight,
              windowWidth: fullWidth
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all', before: '.no-pdf-break' }
          };
          // Use blob + <a> download so browser does not block download in popup (View Report opens in new window)
          html2pdf().set(opt).from(element).toPdf().get('pdf').then(function (pdf) {
            var blob = pdf.output('blob');
            if (!blob || blob.size < 100) {
              restoreBtn();
              console.error('PDF: generated blob empty or too small', blob ? blob.size : 0);
              alert('產生的 PDF 無效，請使用「Print Report」或稍後再試。');
              return;
            }
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            restoreBtn();
          }).catch(function (err) {
            restoreBtn();
            console.error('PDF error:', err);
            alert('無法產生 PDF：' + (err && err.message ? err.message : '請使用「Print Report」或稍後再試。'));
          });
        });
      }, 150);
    }
    
    // Load report on page load
    loadReport();
  </script>
</body>
</html>
