<!DOCTYPE html>
<html lang="zh-HK" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOB Search - EASY Easy Job</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="common.css" rel="stylesheet">
  <style>
    body { background: #fff; }
    .search-input { @apply bg-white rounded-full px-8 py-5 text-lg shadow-lg border-4 border-white focus:outline-none; }
    .search-btn { @apply bg-black text-white px-12 py-5 rounded-full font-bold hover:bg-gray-800; }
    .card { @apply bg-white rounded-3xl shadow-xl border-4 border-black p-8 text-center; }
  </style>
</head>
<body class="bg-[#fafafa] text-neutral-900 antialiased min-h-screen flex flex-col">

  <!-- Navigation (aligned to index.html) -->
  <nav class="sticky top-0 z-30 border-b border-neutral-200/90 bg-white/90 backdrop-blur-md">
    <div class="container mx-auto px-4 md:px-6 py-3.5 flex flex-col lg:flex-row items-center justify-between gap-4">
      <a href="index.html" class="flex items-baseline gap-1.5 font-bold tracking-tight">
        <span class="text-2xl text-cyan-600">EASY</span><span class="text-lg font-semibold text-neutral-900">Easy Job</span>
      </a>
      <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm font-medium text-neutral-600">
        <a href="index.html" class="hover:text-cyan-600 transition">Home</a>
        <a href="quiz.html" class="hover:text-cyan-600 transition">JOB Quiz</a>
        <a href="job-search.html" class="text-cyan-700 hover:text-cyan-600 transition">JOB Search</a>
        <a href="cv-template.html" class="hover:text-cyan-600 transition">CV Template</a>
        <a href="coach.html" class="hover:text-cyan-600 transition">Interview Coach</a>
      </div>
      <div class="flex w-full lg:w-auto items-center gap-3 justify-center lg:justify-end">
        <div class="relative flex-1 min-w-0 lg:w-56">
          <input type="text" placeholder="Search" aria-label="Search"
                 class="w-full rounded-full border border-neutral-200 bg-neutral-50 py-2.5 pl-4 pr-10 text-sm text-neutral-800 placeholder:text-neutral-400 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20">
          <button type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-cyan-600" aria-label="Submit search">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
        </div>
        <a href="login.html" id="authLink" class="shrink-0 text-sm font-medium text-neutral-600 hover:text-cyan-600 transition">Login</a>
      </div>
    </div>
  </nav>

  <main class="site-main flex-1">
  <!-- Search Bar (layout like reference, colors kept) -->
  <section class="border-b border-neutral-200/80 bg-gradient-to-b from-white via-cyan-50/60 to-white">
    <div class="container mx-auto px-6 max-w-6xl py-10 md:py-12">
      <div class="mx-auto max-w-5xl">
        <div class="rounded-3xl border border-neutral-200 bg-white/90 shadow-xl backdrop-blur-sm p-5 md:p-6">
          <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
            <div class="md:col-span-4">
              <label class="block text-xs font-semibold tracking-wide text-neutral-500 mb-2">Keywords</label>
              <input type="text" id="jobQ" placeholder="Enter keywords"
                     class="w-full rounded-2xl border border-neutral-200 bg-white px-4 py-3 text-sm text-neutral-800 placeholder:text-neutral-400 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20">
            </div>
            <div class="md:col-span-3">
              <label class="block text-xs font-semibold tracking-wide text-neutral-500 mb-2">Category</label>
              <select id="jobCategory"
                class="w-full rounded-2xl border border-neutral-200 bg-white px-4 py-3 text-sm text-neutral-800 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20">
                <option>Any category</option>
                <option>Education</option>
                <option>Administration</option>
                <option>Marketing</option>
                <option>IT</option>
              </select>
            </div>
            <div class="md:col-span-3">
              <label class="block text-xs font-semibold tracking-wide text-neutral-500 mb-2">Location</label>
              <input type="text" id="jobLocation" placeholder="Enter district, city, or region"
                     class="w-full rounded-2xl border border-neutral-200 bg-white px-4 py-3 text-sm text-neutral-800 placeholder:text-neutral-400 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20">
            </div>
            <div class="md:col-span-2 flex md:justify-end">
              <button id="jobSearchBtn" class="w-full md:w-auto inline-flex items-center justify-center rounded-2xl bg-cyan-600 px-6 py-3 text-sm font-semibold text-white hover:bg-cyan-700 transition shadow-sm">
                Search
              </button>
            </div>
          </div>

          <div class="mt-5 flex flex-wrap gap-2.5">
            <!-- Job type multi-select dropdown -->
            <div class="relative" id="jobTypeDropdown">
              <button type="button" id="jobTypeBtn"
                      class="inline-flex items-center gap-2 rounded-full border border-neutral-200 bg-neutral-50 px-4 py-2 text-xs font-semibold text-neutral-700 hover:bg-neutral-100 transition">
                <span id="jobTypeBtnLabel">Job type</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-neutral-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd" />
                </svg>
              </button>

              <div id="jobTypeMenu"
                   class="hidden absolute left-0 mt-3 w-72 rounded-3xl border border-neutral-200 bg-white shadow-2xl p-3 z-20">
                <div class="space-y-2 p-1">
                  <label class="flex items-center gap-3 rounded-2xl px-3 py-2 hover:bg-neutral-50 cursor-pointer">
                    <input type="checkbox" class="jobTypeOption h-5 w-5 rounded border-neutral-300 text-cyan-600 focus:ring-cyan-500" value="Full time">
                    <span class="text-sm font-medium text-neutral-800">Full time</span>
                  </label>
                  <label class="flex items-center gap-3 rounded-2xl px-3 py-2 hover:bg-neutral-50 cursor-pointer">
                    <input type="checkbox" class="jobTypeOption h-5 w-5 rounded border-neutral-300 text-cyan-600 focus:ring-cyan-500" value="Part time">
                    <span class="text-sm font-medium text-neutral-800">Part time</span>
                  </label>
                  <label class="flex items-center gap-3 rounded-2xl px-3 py-2 hover:bg-neutral-50 cursor-pointer">
                    <input type="checkbox" class="jobTypeOption h-5 w-5 rounded border-neutral-300 text-cyan-600 focus:ring-cyan-500" value="Contract/Temp">
                    <span class="text-sm font-medium text-neutral-800">Contract/Temp</span>
                  </label>
                  <label class="flex items-center gap-3 rounded-2xl px-3 py-2 hover:bg-neutral-50 cursor-pointer">
                    <input type="checkbox" class="jobTypeOption h-5 w-5 rounded border-neutral-300 text-cyan-600 focus:ring-cyan-500" value="Casual/Vacation">
                    <span class="text-sm font-medium text-neutral-800">Casual/Vacation</span>
                  </label>
                </div>
              </div>
            </div>
            <button type="button" class="inline-flex items-center gap-2 rounded-full border border-neutral-200 bg-neutral-50 px-4 py-2 text-xs font-semibold text-neutral-700 hover:bg-neutral-100 transition">
              Salary
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-neutral-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd" />
              </svg>
            </button>
            <button type="button" class="inline-flex items-center gap-2 rounded-full border border-neutral-200 bg-neutral-50 px-4 py-2 text-xs font-semibold text-neutral-700 hover:bg-neutral-100 transition">
              Posted date
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-neutral-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Main content -->
  <div class="container mx-auto px-6 py-16 max-w-7xl">

    <!-- Row 1: Classification + Trending -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-16 items-start">
      


      <!-- Right: Trending jobs image -->
      <div class="lg:col-span-8">
        <h2 class="text-4xl font-black mb-8">Trending Jobs Hiring Now!</h2>
        <div class="rounded-3xl overflow-hidden shadow-2xl">
          <img src="search.png" alt="Trending Jobs" class="w-full">
        </div>
      </div>
    </div>

    <!-- Row 2: Recommended jobs grid -->
    <div class="text-center">
      <h2 class="text-4xl font-black mb-12">Recommended Jobs</h2>
      
      <div id="jobResultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 max-w-6xl mx-auto"></div>
      <p id="jobResultsMeta" class="text-sm text-gray-500 mt-6"></p>
    </div>

  </div>
  <script>
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function buildCard(job) {
      var id = job && job.id;
      var title = esc(job && job.title);
      var company = esc(job && job.company);
      var location = esc(job && (job.location || ''));
      var salary = esc(job && (job.salary_range || ''));
      var category = esc(job && (job.category || ''));
      var href = id ? ('job-detail.html?id=' + encodeURIComponent(id)) : '#';

      return (
        '<a class="card block hover:-translate-y-1 transition" href="' + href + '">' +
          '<div class="text-2xl font-bold">' + (title || 'Untitled role') + '</div>' +
          '<div class="text-gray-500 text-sm mt-2">' + (company || 'Unknown company') + '</div>' +
          '<div class="text-gray-500 text-sm mt-3">' +
            [category, location, salary].filter(Boolean).join(' · ') +
          '</div>' +
        '</a>'
      );
    }

    async function runSearch() {
      var qEl = document.getElementById('jobQ');
      var catEl = document.getElementById('jobCategory');
      var locEl = document.getElementById('jobLocation');
      var btn = document.getElementById('jobSearchBtn');
      var grid = document.getElementById('jobResultsGrid');
      var meta = document.getElementById('jobResultsMeta');

      var q = (qEl && qEl.value || '').trim();
      var category = (catEl && catEl.value || '').trim();
      if (category === 'Any category') category = '';
      var location = (locEl && locEl.value || '').trim();
      var jobTypes = (window.__easyjob_jobTypes && window.__easyjob_jobTypes.length) ? window.__easyjob_jobTypes : [];

      var params = new URLSearchParams();
      if (q) params.set('q', q);
      if (category) params.set('category', category);
      if (location) params.set('location', location);
      if (jobTypes.length) params.set('type', jobTypes.join(','));

      if (btn) { btn.disabled = true; btn.textContent = 'Searching...'; }
      if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-500">Loading...</div>';
      if (meta) meta.textContent = '';

      try {
        var res = await fetch('/api/jobs?' + params.toString());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var jobs = await res.json();
        if (!Array.isArray(jobs)) jobs = [];

        if (!jobs.length) {
          if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-500">No jobs found. Try different keywords or filters.</div>';
          if (meta) meta.textContent = '0 results';
          return;
        }

        if (grid) grid.innerHTML = jobs.map(buildCard).join('');
        if (meta) meta.textContent = jobs.length + ' result' + (jobs.length === 1 ? '' : 's');
      } catch (e) {
        console.error(e);
        if (grid) grid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to search. Make sure the server is running.</div>';
        if (meta) meta.textContent = '';
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Job type dropdown (multi-select)
      (function () {
        var dropdown = document.getElementById('jobTypeDropdown');
        var btn = document.getElementById('jobTypeBtn');
        var menu = document.getElementById('jobTypeMenu');
        var label = document.getElementById('jobTypeBtnLabel');
        if (!dropdown || !btn || !menu || !label) return;

        function getSelected() {
          var arr = [];
          menu.querySelectorAll('input.jobTypeOption').forEach(function (cb) {
            if (cb.checked) arr.push(cb.value);
          });
          return arr;
        }

        function updateLabel() {
          var selected = getSelected();
          window.__easyjob_jobTypes = selected;
          label.textContent = selected.length ? ('Job type (' + selected.length + ')') : 'Job type';
        }

        function open() { menu.classList.remove('hidden'); }
        function close() { menu.classList.add('hidden'); }
        function toggle() { menu.classList.contains('hidden') ? open() : close(); }

        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });

        menu.addEventListener('click', function (e) {
          e.stopPropagation();
        });

        menu.querySelectorAll('input.jobTypeOption').forEach(function (cb) {
          cb.addEventListener('change', function () {
            updateLabel();
            runSearch();
          });
        });

        document.addEventListener('click', function (e) {
          if (!dropdown.contains(e.target)) close();
        });

        updateLabel();
      })();

      var btn = document.getElementById('jobSearchBtn');
      if (btn) btn.addEventListener('click', runSearch);
      ['jobQ', 'jobLocation'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            runSearch();
          }
        });
      });
      var cat = document.getElementById('jobCategory');
      if (cat) cat.addEventListener('change', runSearch);

      runSearch();
    });
  </script>
  </main>

  <footer class="bg-neutral-950 text-neutral-400 py-12 md:py-14 mt-0">
    <div class="container mx-auto px-4 md:px-6 text-center text-sm">

        <a href="job-search.html" class="hover:text-white transition">JOB Search</a>
        <a href="quiz.html" class="hover:text-white transition">JOB Quiz</a>
        <a href="cv-template.html" class="hover:text-white transition">CV Template</a>
        <a href="coach.html" class="hover:text-white transition">Interview Coach</a>
      </div>
    </div>
  </footer>
  <script src="auth-ui.js"></script>
</body>
</html>
