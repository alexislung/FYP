  <style>
    body { background: #fff; }
    .search-input {
      background: #fff;
      border-radius: 9999px;
      padding: 1.25rem 2rem;
      font-size: 1.125rem;
      border: 4px solid #fff;
      box-shadow: 0 10px 25px -8px rgba(15, 23, 42, 0.2);
      outline: none;
    }
    .search-btn {
      background: #111827;
      color: #fff;
      padding: 1.25rem 3rem;
      border-radius: 9999px;
      font-weight: 700;
      transition: background-color 0.2s ease;
    }
    .search-btn:hover { background: #1f2937; }
    .card {
      border-radius: 1.5rem;
      border: 1px solid #d9e4ef;
      background: linear-gradient(150deg, #f6f7fb 0%, #ffffff 58%, #f4fbff 100%);
      box-shadow:
        0 16px 35px -24px rgba(15, 23, 42, 0.45),
        0 3px 10px rgba(148, 163, 184, 0.22);
      padding: 1.25rem;
      text-align: left;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: card-float 5.2s ease-in-out infinite;
    }
    @media (min-width: 768px) {
      .card {
        padding: 1.5rem;
      }
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow:
        0 24px 38px -24px rgba(15, 23, 42, 0.5),
        0 10px 24px rgba(148, 163, 184, 0.22);
      animation-play-state: paused;
    }
    .job-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 9999px;
      padding: 0.28rem 0.72rem;
      font-size: 0.66rem;
      line-height: 1;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .job-tag--type {
      background: #ffe3ec;
      color: #be185d;
    }
    .job-tag--mode {
      background: #d9f6ff;
      color: #0369a1;
    }
    .promo-carousel-wrap {
      border-top: 1px solid rgba(219, 234, 254, 0.9);
      border-bottom: 1px solid rgba(219, 234, 254, 0.9);
      background:
        linear-gradient(125deg, #ede9fe 0%, #e0e7ff 38%, #cffafe 72%, #dbeafe 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.75),
        inset 0 -1px 0 rgba(255, 255, 255, 0.65),
        0 20px 50px -30px rgba(99, 102, 241, 0.28);
    }
    .promo-carousel-fullbleed {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }
    .promo-carousel {
      position: relative;
      max-width: 1024px;
      margin: 0 auto;
      padding: 1rem 0;
    }
    .promo-stage {
      position: relative;
      height: 250px;
      overflow: hidden;
    }
    .promo-slide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 380px;
      max-width: calc(100vw - 9rem);
      height: 200px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 32px -16px rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(209, 213, 219, 0.9);
      transition: transform 0.45s ease, opacity 0.45s ease, filter 0.45s ease;
      transform: translate(-50%, -50%) scale(0.88);
      opacity: 0;
      filter: blur(0.5px);
      pointer-events: none;
    }
    .promo-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .promo-slide.is-active {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      z-index: 30;
      filter: none;
      pointer-events: auto;
    }
    .promo-slide.is-prev {
      transform: translate(calc(-50% - 340px), -50%) scale(0.86);
      opacity: 0.3;
      z-index: 20;
    }
    .promo-slide.is-next {
      transform: translate(calc(-50% + 340px), -50%) scale(0.86);
      opacity: 0.3;
      z-index: 20;
    }
    .promo-slide.is-hidden {
      transform: translate(-50%, -50%) scale(0.82);
      opacity: 0;
      z-index: 10;
    }
    .promo-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 9999px;
      border: 1px solid rgba(209, 213, 219, 0.95);
      background: rgba(255, 255, 255, 0.92);
      color: #111827;
      box-shadow: 0 8px 20px -12px rgba(15, 23, 42, 0.45);
      font-size: 1.7rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      transition: all 0.2s ease;
    }
    .promo-arrow:hover {
      background: #ffffff;
      transform: translateY(-50%) scale(1.05);
    }
    .promo-arrow--prev { left: 22%; }
    .promo-arrow--next { right: 22%; }
    @media (max-width: 900px) {
      .promo-stage {
        height: 215px;
      }
      .promo-slide {
        width: min(74vw, 360px);
        height: min(42vw, 190px);
      }
      .promo-slide.is-prev {
        transform: translate(calc(-50% - 40vw), -50%) scale(0.85);
      }
      .promo-slide.is-next {
        transform: translate(calc(-50% + 40vw), -50%) scale(0.85);
      }
      .promo-arrow--prev { left: 8px; }
      .promo-arrow--next { right: 8px; }
    }
    @media (max-width: 640px) {
      .promo-stage {
        height: 195px;
      }
      .promo-slide {
        width: min(82vw, 340px);
        height: min(46vw, 170px);
      }
      .promo-slide.is-prev,
      .promo-slide.is-next {
        opacity: 0.18;
      }
      .promo-arrow {
        width: 38px;
        height: 38px;
        font-size: 1.45rem;
      }
    }
    @keyframes card-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
  </style>
</head>

          <button type="button" data-category="Education" class="category-quick-btn text-left rounded-xl border border-neutral-200 px-4 py-3 hover:border-cyan-300 hover:bg-cyan-50/50 transition">Education</button>
          <button type="button" data-category="Engineering" class="category-quick-btn text-left rounded-xl border border-neutral-200 px-4 py-3 hover:border-cyan-300 hover:bg-cyan-50/50 transition">Engineering</button>
          <button type="button" data-category="Design &amp; Creative" class="category-quick-btn text-left rounded-xl border border-neutral-200 px-4 py-3 hover:border-cyan-300 hover:bg-cyan-50/50 transition">Design &amp; Creative</button>
          <button type="button" data-category="Administration" class="category-quick-btn text-left rounded-xl border border-neutral-200 px-4 py-3 hover:border-cyan-300 hover:bg-cyan-50/50 transition">Administration</button>
          <button type="button" data-category="Human Resources" class="category-quick-btn text-left rounded-xl border border-neutral-200 px-4 py-3 hover:border-cyan-300 hover:bg-cyan-50/50 transition">Human Resources</button>
          <button type="button" data-category="Other" class="category-quick-btn text-left rounded-xl border border-neutral-200 px-4 py-3 hover:border-cyan-300 hover:bg-cyan-50/50 transition">Other</button>
        </div>
      </div>
    </div>

    
    <section class="promo-carousel-wrap promo-carousel-fullbleed py-7 md:py-9 mb-14" aria-label="Job safety guide carousel">
      <div class="max-w-7xl mx-auto px-4 md:px-6">
        <div id="promoCarousel" class="promo-carousel">
          <button type="button" id="promoPrev" class="promo-arrow promo-arrow--prev" aria-label="Previous slide">&#8249;</button>
          <div class="promo-stage">
            <figure class="promo-slide is-active"><img src="4.png" data-fallback-src="/4.png" alt="Job guide image 4" loading="lazy"></figure>
            <figure class="promo-slide"><img src="5.png" data-fallback-src="/5.png" alt="Job guide image 5" loading="lazy"></figure>
            <figure class="promo-slide"><img src="6.png" data-fallback-src="/6.png" alt="Job guide image 6" loading="lazy"></figure>
            <figure class="promo-slide"><img src="7.png" data-fallback-src="/7.png" alt="Job guide image 7" loading="lazy"></figure>
            <figure class="promo-slide"><img src="8.png" data-fallback-src="/8.png" alt="Job guide image 8" loading="lazy"></figure>
            <figure class="promo-slide"><img src="9.png" data-fallback-src="/9.png" alt="Job guide image 9" loading="lazy"></figure>
            <figure class="promo-slide"><img src="10.png" data-fallback-src="/10.png" alt="Job guide image 10" loading="lazy"></figure>
          </div>
          <button type="button" id="promoNext" class="promo-arrow promo-arrow--next" aria-label="Next slide">&#8250;</button>
        </div>
      </div>
    </section>

    
    <div class="text-center">
      <h2 class="text-4xl font-black mb-12">Recommended Jobs</h2>
      
      <div id="jobResultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 max-w-6xl mx-auto"></div>
      <p id="jobResultsMeta" class="text-sm text-gray-500 mt-6"></p>
    </div>

  </div>
  <script>
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function inferJobType(job) {
      var text = (((job && job.title) || '') + ' ' + ((job && job.requirements) || '')).toLowerCase();
      if (text.includes('part-time') || text.includes('part time')) return 'Part-time';
      if (text.includes('contract') || text.includes('temp')) return 'Contract/Temp';
      if (text.includes('casual') || text.includes('vacation')) return 'Casual/Vacation';
      return 'Full-time';
    }

    function inferWorkMode(job) {
      var text = (((job && job.location) || '') + ' ' + ((job && job.requirements) || '')).toLowerCase();
      if (text.includes('remote')) return 'Remote';
      if (text.includes('hybrid')) return 'Hybrid';
      return 'On-site';
    }

    function buildCard(job) {
      var id = job && job.id;
      var title = esc(job && job.title);
      var company = esc(job && job.company);
      var location = esc(job && (job.location || ''));
      var salary = esc(job && (job.salary_range || ''));
      var category = esc(job && (job.category || ''));
      var type = esc(inferJobType(job));
      var mode = esc(inferWorkMode(job));
      var href = id ? ('job-detail.html?id=' + encodeURIComponent(id)) : '#';
      var flowDelay = ((id || 1) % 7) * 0.18;

      return (
        '<a class="card block" style="animation-delay:-' + flowDelay + 's" href="' + href + '">' +
          '<div class="flex flex-wrap gap-2">' +
            '<span class="job-tag job-tag--type">' + type + '</span>' +
            '<span class="job-tag job-tag--mode">' + mode + '</span>' +
          '</div>' +
          '<h3 class="mt-4 text-[2rem] leading-[1.1] font-extrabold text-neutral-900 line-clamp-2">' + (title || 'Untitled role') + '</h3>' +
          '<p class="mt-2 text-[1.1rem] text-neutral-500 truncate">' + (company || 'Unknown company') + '</p>' +
          '<p class="mt-4 text-sm text-neutral-400">' + (salary || 'Negotiable') + ' · ' + (location || 'Hong Kong') + '</p>' +
          '<div class="mt-auto pt-1"></div>' +
          '<div class="hidden text-xs text-neutral-400">' + (category || 'General') + '</div>' +
          '</div>' +
        '</a>'
      );
    }

    async function runSearch() {
      var qEl = document.getElementById('jobQ');
      var catEl = document.getElementById('jobCategory');
      var locEl = document.getElementById('jobLocation');
      var btn = document.getElementById('jobSearchBtn');
      var grid = document.getElementById('jobResultsGrid');
      var meta = document.getElementById('jobResultsMeta');

      var q = (qEl && qEl.value || '').trim();
      var category = (catEl && catEl.value || '').trim();
      if (category === 'Any category') category = '';
      var location = (locEl && locEl.value || '').trim();
      var jobTypes = (window.__easyjob_jobTypes && window.__easyjob_jobTypes.length) ? window.__easyjob_jobTypes : [];
      var salaryFrom = (window.__easyjob_salaryFromK !== undefined && window.__easyjob_salaryFromK !== null) ? window.__easyjob_salaryFromK : 0;
      var salaryTo = (window.__easyjob_salaryToK !== undefined && window.__easyjob_salaryToK !== null) ? window.__easyjob_salaryToK : 120;
      var postedDays = window.__easyjob_postedDays || '';

      var params = new URLSearchParams();
      if (q) params.set('q', q);
      if (category) params.set('category', category);
      if (location) params.set('location', location);
      if (jobTypes.length) params.set('type', jobTypes.join(','));
      params.set('min_k', String(salaryFrom));
      params.set('max_k', String(salaryTo));
      if (postedDays) params.set('posted_days', postedDays);

      if (btn) { btn.disabled = true; btn.textContent = 'Searching...'; }
      if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-500">Loading...</div>';
      if (meta) meta.textContent = '';

      try {
        var res = await fetch('/api/jobs?' + params.toString());
        var rawText = await res.text();
        var jobs = [];
        try {
          jobs = JSON.parse(rawText);
        } catch (parseErr) {
          jobs = [];
        }
        if (!res.ok) {
          var detail = 'HTTP ' + res.status;
          if (jobs && jobs.error && jobs.error.message) detail = jobs.error.message;
          throw new Error(detail);
        }
        if (!Array.isArray(jobs)) jobs = [];

        if (!jobs.length) {
          if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-500">No jobs found. Try different keywords or filters.</div>';
          if (meta) meta.textContent = '0 results';
          return;
        }

        var limitedJobs = jobs.slice(0, 9);
        if (grid) grid.innerHTML = limitedJobs.map(buildCard).join('');
        if (meta) {
          meta.textContent = limitedJobs.length + ' result' + (limitedJobs.length === 1 ? '' : 's') + ' shown';
        }
      } catch (e) {
        console.error(e);
        var msg = (e && e.message) ? String(e.message) : 'Request failed';
        if (grid) grid.innerHTML = '<div class="col-span-full text-center text-red-500">' + msg + '</div><p class="col-span-full text-center text-sm text-gray-500 mt-2">Tip: update <code class="bg-gray-100 px-1 rounded">database.py</code> <code class="bg-gray-100 px-1 rounded">_DEFAULT_DATABASE_URL</code> with the current Supabase URI (try Transaction pooler port 6543 if 5432 fails). Restart <code class="bg-gray-100 px-1 rounded">run_website.bat</code> and read the server window.</p>';
        if (meta) meta.textContent = '';
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      (function setupPromoImageFallback() {
        var imgs = document.querySelectorAll('#promoCarousel img[data-fallback-src]');
        imgs.forEach(function (img) {
          var fallback = img.getAttribute('data-fallback-src');
          if (!fallback) return;
          img.addEventListener('error', function handleError() {
            if (img.getAttribute('data-fallback-used') === '1') return;
            img.setAttribute('data-fallback-used', '1');
            img.src = fallback;
          });
        });
      })();

      (function setupPromoCarousel() {
        var root = document.getElementById('promoCarousel');
        if (!root) return;
        var slides = Array.prototype.slice.call(root.querySelectorAll('.promo-slide'));
        var prev = document.getElementById('promoPrev');
        var next = document.getElementById('promoNext');
        if (!slides.length || !prev || !next) return;
        var current = 0;
        var timer = null;
        function relativeIndex(i) {
          var diff = i - current;
          var half = Math.floor(slides.length / 2);
          if (diff > half) diff -= slides.length;
          if (diff < -half) diff += slides.length;
          return diff;
        }
        function render() {
          slides.forEach(function (slide, i) {
            var diff = relativeIndex(i);
            slide.classList.remove('is-active', 'is-prev', 'is-next', 'is-hidden');
            if (diff === 0) {
              slide.classList.add('is-active');
              slide.setAttribute('aria-hidden', 'false');
            } else if (diff === -1) {
              slide.classList.add('is-prev');
              slide.setAttribute('aria-hidden', 'true');
            } else if (diff === 1) {
              slide.classList.add('is-next');
              slide.setAttribute('aria-hidden', 'true');
            } else {
              slide.classList.add('is-hidden');
              slide.setAttribute('aria-hidden', 'true');
            }
          });
        }
        function move(step) {
          current = (current + step + slides.length) % slides.length;
          render();
        }
        function stopAuto() {
          if (timer) {
            clearInterval(timer);
            timer = null;
          }
        }
        function startAuto() {
          stopAuto();
          timer = setInterval(function () {
            move(1);
          }, 3600);
        }
        prev.addEventListener('click', function () {
          move(-1);
          startAuto();
        });
        next.addEventListener('click', function () {
          move(1);
          startAuto();
        });
        root.addEventListener('mouseenter', stopAuto);
        root.addEventListener('mouseleave', startAuto);
        root.addEventListener('focusin', stopAuto);
        root.addEventListener('focusout', startAuto);
        render();
        startAuto();
      })();

      function setupSingleMenu(dropdownId, btnId, menuId) {
        var dropdown = document.getElementById(dropdownId);
        var btn = document.getElementById(btnId);
        var menu = document.getElementById(menuId);
        if (!dropdown || !btn || !menu) return null;
        function open() { menu.classList.remove('hidden'); }
        function close() { menu.classList.add('hidden'); }
        function toggle() { menu.classList.contains('hidden') ? open() : close(); }
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });
        menu.addEventListener('click', function (e) { e.stopPropagation(); });
        document.addEventListener('click', function (e) {
          if (!dropdown.contains(e.target)) close();
        });
        return { close: close };
      }

      (function () {
        var dropdown = document.getElementById('jobTypeDropdown');
        var btn = document.getElementById('jobTypeBtn');
        var menu = document.getElementById('jobTypeMenu');
        var label = document.getElementById('jobTypeBtnLabel');
        if (!dropdown || !btn || !menu || !label) return;

        function getSelected() {
          var arr = [];
          menu.querySelectorAll('input.jobTypeOption').forEach(function (cb) {
            if (cb.checked) arr.push(cb.value);
          });
          return arr;
        }

        function updateLabel() {
          var selected = getSelected();
          window.__easyjob_jobTypes = selected;
          label.textContent = selected.length ? ('Job type (' + selected.length + ')') : 'Job type';
        }

        function open() { menu.classList.remove('hidden'); }
        function close() { menu.classList.add('hidden'); }
        function toggle() { menu.classList.contains('hidden') ? open() : close(); }

        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });

        menu.addEventListener('click', function (e) {
          e.stopPropagation();
        });

        menu.querySelectorAll('input.jobTypeOption').forEach(function (cb) {
          cb.addEventListener('change', function () {
            updateLabel();
            runSearch();
          });
        });

        document.addEventListener('click', function (e) {
          if (!dropdown.contains(e.target)) close();
        });

        updateLabel();
      })();

      (function () {
        var ref = setupSingleMenu('salaryFromDropdown', 'salaryFromBtn', 'salaryFromMenu');
        var label = document.getElementById('salaryFromBtnLabel');
        var menu = document.getElementById('salaryFromMenu');
        if (!label || !menu) return;
        function update() {
          var selected = menu.querySelector('input.salaryFromOption:checked');
          var k = selected ? Number(selected.value) : 0;
          if (isNaN(k)) k = 0;
          window.__easyjob_salaryFromK = k;
          label.textContent = 'Salary from $' + k + 'K';
        }
        menu.querySelectorAll('input.salaryFromOption').forEach(function (radio) {
          radio.addEventListener('change', function () {
            update();
            if ((window.__easyjob_salaryToK || 120) < (window.__easyjob_salaryFromK || 0)) {
              window.__easyjob_salaryToK = window.__easyjob_salaryFromK;
              var toRadio = document.querySelector('input.salaryToOption[value="' + String(window.__easyjob_salaryToK) + '"]');
              if (toRadio) toRadio.checked = true;
              var toLabel = document.getElementById('salaryToBtnLabel');
              if (toLabel) toLabel.textContent = 'To $' + window.__easyjob_salaryToK + 'K';
            }
            runSearch();
            if (ref) ref.close();
          });
        });
        update();
      })();

      (function () {
        var ref = setupSingleMenu('salaryToDropdown', 'salaryToBtn', 'salaryToMenu');
        var label = document.getElementById('salaryToBtnLabel');
        var menu = document.getElementById('salaryToMenu');
        if (!label || !menu) return;
        function update() {
          var selected = menu.querySelector('input.salaryToOption:checked');
          var k = selected ? Number(selected.value) : 120;
          if (isNaN(k)) k = 120;
          window.__easyjob_salaryToK = k;
          label.textContent = 'To $' + k + (k >= 120 ? 'K+' : 'K');
        }
        menu.querySelectorAll('input.salaryToOption').forEach(function (radio) {
          radio.addEventListener('change', function () {
            update();
            if ((window.__easyjob_salaryToK || 120) < (window.__easyjob_salaryFromK || 0)) {
              alert('Maximum salary must be greater than or equal to minimum salary.');
              window.__easyjob_salaryToK = window.__easyjob_salaryFromK || 0;
              var fallback = document.querySelector('input.salaryToOption[value="' + String(window.__easyjob_salaryToK) + '"]');
              if (fallback) fallback.checked = true;
              update();
            }
            runSearch();
            if (ref) ref.close();
          });
        });
        update();
      })();

      (function () {
        var ref = setupSingleMenu('postedDropdown', 'postedBtn', 'postedMenu');
        var label = document.getElementById('postedBtnLabel');
        var menu = document.getElementById('postedMenu');
        if (!label || !menu) return;
        function update() {
          var selected = menu.querySelector('input.postedOption:checked');
          var val = selected ? selected.value : '';
          var text = selected ? selected.parentElement.textContent.trim() : 'Any time';
          window.__easyjob_postedDays = val;
          label.textContent = 'Posted date: ' + text;
        }
        menu.querySelectorAll('input.postedOption').forEach(function (radio) {
          radio.addEventListener('change', function () {
            update();
            runSearch();
            if (ref) ref.close();
          });
        });
        update();
      })();

      var btn = document.getElementById('jobSearchBtn');
      if (btn) btn.addEventListener('click', runSearch);
      ['jobQ', 'jobLocation'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            runSearch();
          }
        });
      });
      var cat = document.getElementById('jobCategory');
      if (cat) cat.addEventListener('change', runSearch);

      document.querySelectorAll('.category-quick-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var selectedCategory = btn.getAttribute('data-category') || '';
          if (cat) cat.value = selectedCategory;
          runSearch();
          var results = document.getElementById('jobResultsGrid');
          if (results) results.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      runSearch();
    });
  </script>
