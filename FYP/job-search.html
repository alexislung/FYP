  <!-- Main content -->

      <!-- Right: Trending jobs image -->

        <div class="rounded-3xl overflow-hidden shadow-2xl">

    <!-- Row 2: Recommended jobs grid -->
    <div class="text-center">
      <h2 class="text-4xl font-black mb-12">Recommended Jobs</h2>
      
      <div id="jobResultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 max-w-6xl mx-auto"></div>
      <p id="jobResultsMeta" class="text-sm text-gray-500 mt-6"></p>

  <script>
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function buildCard(job) {
      var id = job && job.id;
      var title = esc(job && job.title);
      var company = esc(job && job.company);
      var location = esc(job && (job.location || ''));
      var salary = esc(job && (job.salary_range || ''));
      var category = esc(job && (job.category || ''));
      var href = id ? ('job-detail.html?id=' + encodeURIComponent(id)) : '#';
      var flowDelay = ((id || 1) % 7) * 0.18;

      return (
        '<a class="card block" style="animation-delay:-' + flowDelay + 's" href="' + href + '">' +
          '<div class="text-[11px] font-semibold uppercase tracking-wide text-cyan-700">' + (category || 'General') + '</div>' +
          '<h3 class="mt-2 text-2xl leading-tight font-bold text-neutral-900">' + (title || 'Untitled role') + '</h3>' +
          '<p class="mt-2 text-sm text-neutral-500">' + (location || 'Hong Kong') + '</p>' +
          '<div class="mt-auto pt-4 border-t border-dashed border-neutral-200 flex items-center justify-between gap-3">' +
            '<p class="text-sm text-neutral-500 truncate">' + (company || 'Unknown company') + '</p>' +
            '<span class="salary-pill">' + (salary || 'Negotiable') + '</span>' +
          '</div>' +
        '</a>'
      );
    }

    async function runSearch() {
      var qEl = document.getElementById('jobQ');
      var catEl = document.getElementById('jobCategory');
      var locEl = document.getElementById('jobLocation');
      var btn = document.getElementById('jobSearchBtn');
      var grid = document.getElementById('jobResultsGrid');
      var meta = document.getElementById('jobResultsMeta');

      var q = (qEl && qEl.value || '').trim();
      var category = (catEl && catEl.value || '').trim();
      if (category === 'Any category') category = '';
      var location = (locEl && locEl.value || '').trim();
      var jobTypes = (window.__easyjob_jobTypes && window.__easyjob_jobTypes.length) ? window.__easyjob_jobTypes : [];
      var salaryFrom = (window.__easyjob_salaryFromK !== undefined && window.__easyjob_salaryFromK !== null) ? window.__easyjob_salaryFromK : 0;
      var salaryTo = (window.__easyjob_salaryToK !== undefined && window.__easyjob_salaryToK !== null) ? window.__easyjob_salaryToK : 120;
      var postedDays = window.__easyjob_postedDays || '';

      var params = new URLSearchParams();
      if (q) params.set('q', q);
      if (category) params.set('category', category);
      if (location) params.set('location', location);
      if (jobTypes.length) params.set('type', jobTypes.join(','));
      params.set('min_k', String(salaryFrom));
      params.set('max_k', String(salaryTo));
      if (postedDays) params.set('posted_days', postedDays);

      if (btn) { btn.disabled = true; btn.textContent = 'Searching...'; }
      if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-500">Loading...</div>';
      if (meta) meta.textContent = '';

      try {
        var res = await fetch('/api/jobs?' + params.toString());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var jobs = await res.json();
        if (!Array.isArray(jobs)) jobs = [];

        if (!jobs.length) {
          if (grid) grid.innerHTML = '<div class="col-span-full text-center text-gray-500">No jobs found. Try different keywords or filters.</div>';
          if (meta) meta.textContent = '0 results';
          return;
        }

        if (grid) grid.innerHTML = jobs.map(buildCard).join('');
        if (meta) meta.textContent = jobs.length + ' result' + (jobs.length === 1 ? '' : 's');
      } catch (e) {
        console.error(e);
        if (grid) grid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to search. Make sure the server is running.</div>';
        if (meta) meta.textContent = '';
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Search'; }
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      function setupSingleMenu(dropdownId, btnId, menuId) {
        var dropdown = document.getElementById(dropdownId);
        var btn = document.getElementById(btnId);
        var menu = document.getElementById(menuId);
        if (!dropdown || !btn || !menu) return null;
        function open() { menu.classList.remove('hidden'); }
        function close() { menu.classList.add('hidden'); }
        function toggle() { menu.classList.contains('hidden') ? open() : close(); }
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });
        menu.addEventListener('click', function (e) { e.stopPropagation(); });
        document.addEventListener('click', function (e) {
          if (!dropdown.contains(e.target)) close();
        });
        return { close: close };
      }

      // Job type dropdown (multi-select)
      (function () {
        var dropdown = document.getElementById('jobTypeDropdown');
        var btn = document.getElementById('jobTypeBtn');
        var menu = document.getElementById('jobTypeMenu');
        var label = document.getElementById('jobTypeBtnLabel');
        if (!dropdown || !btn || !menu || !label) return;

        function getSelected() {
          var arr = [];
          menu.querySelectorAll('input.jobTypeOption').forEach(function (cb) {
            if (cb.checked) arr.push(cb.value);
          });
          return arr;
        }

        function updateLabel() {
          var selected = getSelected();
          window.__easyjob_jobTypes = selected;
          label.textContent = selected.length ? ('Job type (' + selected.length + ')') : 'Job type';
        }

        function open() { menu.classList.remove('hidden'); }
        function close() { menu.classList.add('hidden'); }
        function toggle() { menu.classList.contains('hidden') ? open() : close(); }

        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });

        menu.addEventListener('click', function (e) {
          e.stopPropagation();
        });

        menu.querySelectorAll('input.jobTypeOption').forEach(function (cb) {
          cb.addEventListener('change', function () {
            updateLabel();
            runSearch();
          });
        });

        document.addEventListener('click', function (e) {
          if (!dropdown.contains(e.target)) close();
        });

        updateLabel();
      })();

      // Salary from dropdown
      (function () {
        var ref = setupSingleMenu('salaryFromDropdown', 'salaryFromBtn', 'salaryFromMenu');
        var label = document.getElementById('salaryFromBtnLabel');
        var menu = document.getElementById('salaryFromMenu');
        if (!label || !menu) return;
        function update() {
          var selected = menu.querySelector('input.salaryFromOption:checked');
          var k = selected ? Number(selected.value) : 0;
          if (isNaN(k)) k = 0;
          window.__easyjob_salaryFromK = k;
          label.textContent = 'Salary from $' + k + 'K';
        }
        menu.querySelectorAll('input.salaryFromOption').forEach(function (radio) {
          radio.addEventListener('change', function () {
            update();
            if ((window.__easyjob_salaryToK || 120) < (window.__easyjob_salaryFromK || 0)) {
              window.__easyjob_salaryToK = window.__easyjob_salaryFromK;
              var toRadio = document.querySelector('input.salaryToOption[value="' + String(window.__easyjob_salaryToK) + '"]');
              if (toRadio) toRadio.checked = true;
              var toLabel = document.getElementById('salaryToBtnLabel');
              if (toLabel) toLabel.textContent = 'To $' + window.__easyjob_salaryToK + 'K';
            }
            runSearch();
            if (ref) ref.close();
          });
        });
        update();
      })();

      // Salary to dropdown
      (function () {
        var ref = setupSingleMenu('salaryToDropdown', 'salaryToBtn', 'salaryToMenu');
        var label = document.getElementById('salaryToBtnLabel');
        var menu = document.getElementById('salaryToMenu');
        if (!label || !menu) return;
        function update() {
          var selected = menu.querySelector('input.salaryToOption:checked');
          var k = selected ? Number(selected.value) : 120;
          if (isNaN(k)) k = 120;
          window.__easyjob_salaryToK = k;
          label.textContent = 'To $' + k + (k >= 120 ? 'K+' : 'K');
        }
        menu.querySelectorAll('input.salaryToOption').forEach(function (radio) {
          radio.addEventListener('change', function () {
            update();
            if ((window.__easyjob_salaryToK || 120) < (window.__easyjob_salaryFromK || 0)) {
              alert('Maximum salary must be greater than or equal to minimum salary.');
              window.__easyjob_salaryToK = window.__easyjob_salaryFromK || 0;
              var fallback = document.querySelector('input.salaryToOption[value="' + String(window.__easyjob_salaryToK) + '"]');
              if (fallback) fallback.checked = true;
              update();
            }
            runSearch();
            if (ref) ref.close();
          });
        });
        update();
      })();

      // Posted date dropdown
      (function () {
        var ref = setupSingleMenu('postedDropdown', 'postedBtn', 'postedMenu');
        var label = document.getElementById('postedBtnLabel');
        var menu = document.getElementById('postedMenu');
        if (!label || !menu) return;
        function update() {
          var selected = menu.querySelector('input.postedOption:checked');
          var val = selected ? selected.value : '';
          var text = selected ? selected.parentElement.textContent.trim() : 'Any time';
          window.__easyjob_postedDays = val;
          label.textContent = 'Posted date: ' + text;
        }
        menu.querySelectorAll('input.postedOption').forEach(function (radio) {
          radio.addEventListener('change', function () {
            update();
            runSearch();
            if (ref) ref.close();
          });
        });
        update();
      })();

      var btn = document.getElementById('jobSearchBtn');
      if (btn) btn.addEventListener('click', runSearch);
      ['jobQ', 'jobLocation'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            runSearch();
          }
        });
      });
      var cat = document.getElementById('jobCategory');
      if (cat) cat.addEventListener('change', runSearch);

      runSearch();
    });
  </script>
