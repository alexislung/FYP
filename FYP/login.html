<!DOCTYPE html>
<html lang="zh-HK" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In to EasyJob</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="common.css" rel="stylesheet">
  <style>
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear { display: none; }
  </style>
</head>
<body class="bg-[#fafafa] text-neutral-900 antialiased min-h-screen flex flex-col">

  <!-- Navigation (aligned to index.html) -->
  <nav class="sticky top-0 z-30 border-b border-neutral-200/90 bg-white/90 backdrop-blur-md">
    <div class="container mx-auto px-4 md:px-6 py-3.5 flex flex-col lg:flex-row items-center justify-between gap-4">
      <a href="index.html" class="flex items-baseline gap-1.5 font-bold tracking-tight">
        <span class="text-2xl text-cyan-600">EASY</span><span class="text-lg font-semibold text-neutral-900">Easy Job</span>
      </a>
      <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm font-medium text-neutral-600">
        <a href="index.html" class="hover:text-cyan-600 transition">Home</a>
        <a href="quiz.html" class="hover:text-cyan-600 transition">JOB Quiz</a>
        <a href="job-search.html" class="hover:text-cyan-600 transition">JOB Search</a>
        <a href="cv-template.html" class="hover:text-cyan-600 transition">CV Template</a>
        <a href="coach.html" class="hover:text-cyan-600 transition">Interview Coach</a>
      </div>
      <div class="flex w-full lg:w-auto items-center gap-3 justify-center lg:justify-end">
        <div class="relative flex-1 min-w-0 lg:w-56">
          <input type="text" placeholder="Search" aria-label="Search"
                 class="w-full rounded-full border border-neutral-200 bg-neutral-50 py-2.5 pl-4 pr-10 text-sm text-neutral-800 placeholder:text-neutral-400 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20">
          <button type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-cyan-600" aria-label="Submit search">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
        </div>
        <a href="login.html" id="authLink" class="shrink-0 text-sm font-medium text-cyan-700 hover:text-cyan-600 transition">Login</a>
      </div>
    </div>
  </nav>

  <main class="site-main flex-1 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Log In to EasyJob</h1>
      <p class="mt-1 text-gray-600">Find your own Destiny!</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-xl shadow-lg p-8">
      <form id="loginForm" class="space-y-5">
        <!-- First Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">FIRST NAME</label>
          <input type="text" value="John"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">EMAIL ADDRESS</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        </div>

        <!-- Password -->
        <div class="relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">PASSWORD</label>
          <input type="password" id="loginPassword" placeholder="Your password" required
                 class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
          <button type="button" onclick="togglePassword(this)"
                  class="absolute right-3 top-10 text-gray-500 hover:text-gray-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>

        <!-- Terms Checkbox -->
        <label class="flex items-center space-x-2 cursor-pointer">
          <input type="checkbox" checked required class="w-4 h-4 text-cyan-600 rounded focus:ring-cyan-500">
          <span class="text-sm text-gray-600">I agree to the <a href="#" class="text-cyan-600 underline">Terms of Service</a> and <a href="#" class="text-cyan-600 underline">Privacy Policy</a>.</span>
        </label>

        <!-- Submit Button -->
        <button type="submit"
                id="loginSubmitBtn"
                class="w-full py-3 mt-6 bg-black text-white rounded-lg font-semibold hover:bg-gray-800 transition">
          LOGIN YOUR ACCOUNT
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-300"></div>
        <span class="px-3 text-sm text-gray-500">OR</span>
        <div class="flex-1 border-t border-gray-300"></div>
      </div>

      <!-- Google Login -->
      <button class="w-full flex items-center justify-center gap-3 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
        <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
        <span class="font-medium">Continue with Google</span>
      </button>

      <!-- Sign Up Link -->
      <p class="text-center mt-6 text-sm text-gray-600">
        New User? <a href="signup.html" class="text-cyan-600 font-semibold underline">SIGN UP HERE</a>
      </p>
    </div>
  </div>
  </main>

  <!-- Footer (aligned to index.html) -->
  <footer class="bg-neutral-950 text-neutral-400 py-12 md:py-14 mt-0">
    <div class="container mx-auto px-4 md:px-6 text-center text-sm">
      <p class="font-medium text-neutral-500">© 2025 Easy Job. All rights reserved.</p>
      <div class="mt-6 flex flex-wrap justify-center gap-x-6 gap-y-2 text-neutral-500">
        <a href="job-search.html" class="hover:text-white transition">JOB Search</a>
        <a href="quiz.html" class="hover:text-white transition">JOB Quiz</a>
        <a href="cv-template.html" class="hover:text-white transition">CV Template</a>
        <a href="coach.html" class="hover:text-white transition">Interview Coach</a>
      </div>
    </div>
  </footer>

  <!-- Simple JS -->
  <script>
    const supabaseClient = window.getEasyjobSupabase && window.getEasyjobSupabase();

    // Toggle password visibility
    function togglePassword(btn) {
      const input = btn.previousElementSibling;
      const icon = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3..svg>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
      }
    }

    // Form submit (Supabase login)
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!supabaseClient) {
        alert('Supabase is not initialized (check supabase-config.js).');
        return;
      }

      const btn = document.getElementById('loginSubmitBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (!data?.session) {
          alert('Sign-in not completed: no session returned (you may need to confirm your email first).');
          return;
        }
        try {
          const user = data?.user;
          const meta = user?.user_metadata || {};
          const first = (meta.first_name || meta.firstName || '').trim();
          const last = (meta.last_name || meta.lastName || '').trim();
          const name = (first + ' ' + last).trim() || (user?.email || email);
          localStorage.setItem('easyjob_name', name);
        } catch (_) {}
        alert('Signed in!');
        window.location.href = 'index.html';
      } catch (err) {
        console.error(err);
        alert('Sign-in failed: ' + (err?.message || 'Unknown error'));
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
  </script>
  <script src="auth-ui.js"></script>

</body>
</html>
