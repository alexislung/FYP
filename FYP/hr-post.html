<!DOCTYPE html>
<html lang="zh-HK" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job - EASY Easy Job</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="common.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; }
    .input-field {
      width: 100%;
      border: 2px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.2s ease;
      background: #fff;
    }
    .input-field:focus {
      outline: none;
      border-color: #111827;
    }
    .label-text {
      display: block;
      font-size: 0.875rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body class="bg-[#fafafa] text-neutral-900 antialiased min-h-screen flex flex-col">

  
  <nav class="sticky top-0 z-30 border-b border-neutral-200/90 bg-white/90 backdrop-blur-md">
    <div class="container mx-auto px-4 md:px-6 py-3.5 flex flex-col lg:flex-row items-center justify-between gap-4">
      <a href="index.html" class="flex items-baseline gap-1.5 font-bold tracking-tight">
        <span class="text-2xl text-cyan-600">EASY</span><span class="text-lg font-semibold text-neutral-900">Easy Job</span>
      </a>
      <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm font-medium text-neutral-600">
        <a href="index.html" class="hover:text-cyan-600 transition">Home</a>
        <a href="quiz.html" class="hover:text-cyan-600 transition">JOB Quiz</a>
        <a href="job-search.html" class="hover:text-cyan-600 transition">JOB Search</a>
        <a href="cv-template.html" class="hover:text-cyan-600 transition">CV Template</a>
        <a href="coach.html" class="hover:text-cyan-600 transition">Interview Coach</a>
      </div>
      <div class="flex w-full lg:w-auto items-center gap-3 justify-center lg:justify-end">
        <div class="relative flex-1 min-w-0 lg:w-56">
          <input type="text" placeholder="Search" aria-label="Search"
                 class="w-full rounded-full border border-neutral-200 bg-neutral-50 py-2.5 pl-4 pr-10 text-sm text-neutral-800 placeholder:text-neutral-400 focus:border-cyan-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/20">
          <button type="button" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-cyan-600" aria-label="Submit search">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
        </div>
        <a href="login.html" id="authLink" class="shrink-0 text-sm font-medium text-neutral-600 hover:text-cyan-600 transition">Login</a>
      </div>
    </div>
  </nav>

  
  <main class="site-main flex-1 container mx-auto px-6 py-12 max-w-3xl">
    <div id="businessGateBanner" class="hidden mb-8 rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800"></div>

    <div class="text-center mb-12">
      <h1 class="text-4xl font-black mb-4">Post a New Job</h1>
      <p class="text-gray-500 text-lg">Reach thousands of job seekers in Hong Kong.</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border-4 border-gray-100 p-8 md:p-12">
      <form id="post-job-form" class="space-y-6">
        
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="label-text">Job Title</label>
            <input type="text" name="title" required placeholder="e.g. Senior Marketing Manager" class="input-field">
          </div>
          <div>
            <label class="label-text">Company Name</label>
            <input type="text" name="company" required placeholder="e.g. Global Tech Ltd." class="input-field">
          </div>
        </div>

        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="label-text">Salary Range</label>
            <input type="text" name="salary" required placeholder="e.g. 25k - 35k" class="input-field">
          </div>
          <div>
            <label class="label-text">Category</label>
            <select name="category" class="input-field bg-white">
              <option value="Technology &amp; IT">Information Technology</option>
              <option value="Marketing &amp; Sales">Marketing &amp; Media</option>
              <option value="Administration">Admin &amp; HR</option>
              <option value="Marketing &amp; Sales">Sales &amp; Business Dev</option>
              <option value="Finance &amp; Accounting">Accounting &amp; Finance</option>
              <option value="Design &amp; Creative">Design &amp; Creative</option>
              <option value="Engineering">Engineering</option>
              <option value="Other">Customer Service</option>
              <option value="Education">Education</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        
        <div>
            <label class="label-text">Location</label>
            <select name="location" class="input-field bg-white">
              <option value="Central">Central</option>
              <option value="Causeway Bay">Causeway Bay</option>
              <option value="Quarry Bay">Quarry Bay</option>
              <option value="Tsim Sha Tsui">Tsim Sha Tsui</option>
              <option value="Kwun Tong">Kwun Tong</option>
              <option value="Kowloon Bay">Kowloon Bay</option>
              <option value="Shatin">Shatin</option>
              <option value="Cyberport">Cyberport</option>
              <option value="Science Park">Science Park</option>
              <option value="Other">Other</option>
            </select>
        </div>

        
        <div>
          <label class="label-text">Job Requirements & Description</label>
          <textarea name="requirements" required rows="6" placeholder="List the key responsibilities and requirements..." class="input-field"></textarea>
          <p class="text-xs text-gray-400 mt-2 text-right">Tip: Be specific to attract better candidates.</p>
        </div>

        
        <div class="pt-6">
          <button type="submit" class="w-full bg-black text-white text-xl font-bold py-4 rounded-xl hover:bg-gray-800 transition-transform hover:scale-[1.02] shadow-lg">
            Publish Job Now
          </button>
        </div>

      </form>
    </div>

  </main>

  
  <footer class="bg-neutral-950 text-neutral-400 py-12 md:py-14 mt-0">
    <div class="container mx-auto px-4 md:px-6 text-center text-sm">
      <p class="font-medium text-neutral-500">© 2025 Easy Job. All rights reserved.</p>
      <div class="mt-6 flex flex-wrap justify-center gap-x-6 gap-y-2 text-neutral-500">
        <a href="job-search.html" class="hover:text-white transition">JOB Search</a>
        <a href="quiz.html" class="hover:text-white transition">JOB Quiz</a>
        <a href="cv-template.html" class="hover:text-white transition">CV Template</a>
        <a href="coach.html" class="hover:text-white transition">Interview Coach</a>
      </div>
    </div>
  </footer>
  <script src="auth-ui.js"></script>

  <script>
    async function ensureBusinessAccess() {
      const banner = document.getElementById('businessGateBanner');
      const form = document.getElementById('post-job-form');
      const client = window.getEasyjobSupabase && window.getEasyjobSupabase();

      if (!client) {
        if (banner) {
          banner.classList.remove('hidden');
          banner.textContent = 'Supabase is not initialized. Please sign in again.';
        }
        if (form) form.style.display = 'none';
        return false;
      }

      try {
        const { data } = await client.auth.getSession();
        const session = data && data.session;
        if (!session || !session.user) {
          window.location.href = 'login.html';
          return false;
        }
        const meta = session.user.user_metadata || {};
        const accountType = (meta.account_type || '').toString().toLowerCase();
        localStorage.setItem('easyjob_account_type', accountType || 'jobseeker');
        if (accountType !== 'business') {
          if (banner) {
            banner.classList.remove('hidden');
            banner.textContent = 'Only Business accounts can access this page. Please sign up as a Business account.';
          }
          if (form) form.style.display = 'none';
          return false;
        }
        return true;
      } catch (err) {
        if (banner) {
          banner.classList.remove('hidden');
          banner.textContent = 'Unable to verify account type. Please sign in again.';
        }
        if (form) form.style.display = 'none';
        return false;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await ensureBusinessAccess();
    });

    document.getElementById('post-job-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const hasAccess = await ensureBusinessAccess();
        if (!hasAccess) return;
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = 'Publishing...';
        btn.disabled = true;

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch('/api/jobs/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                alert('✅ Job Published Successfully!');
                window.location.href = `job-detail.html?id=${result.id}`;
            } else {
                alert('❌ Error: ' + (result.error || 'Unknown error'));
            }
        } catch (err) {
            alert('❌ Network Error: ' + err.message);
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });
  </script>
</body>
</html>
